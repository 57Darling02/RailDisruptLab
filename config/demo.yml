project:
  name: main
  base_context_path: outputs/base_context/context_下行计划时刻表.json

build:
  scenarios: config/scenario/demo

solve:
  lp_path: ""
  objective_delay_weight: 1.0
  objective_mode: abs
  cancellation_enabled: false
  cancellation_penalty_weight: 1000.0
  arr_arr_headway_seconds: 180
  dep_dep_headway_seconds: 180
  dwell_seconds_at_stops: 120
  big_m: 100000
  tolerance_delay_seconds: 7200

export-timetable:
  sol_path: ""

analyze:
  enable_metrics: true
  enable_plot: true
  plot_grid: true
  plot_title: Train Timetable
  adj_timetable_path: ""
  adj_timetable_sheet_name: Sheet1

train:
  data:
    limit: 0
  model:
    hidden_dim: 64
    latent_dim: 16
    message_passing_steps: 2
  optimization:
    epochs: 800
    batch_size: 8
    lr: 0.0003
    seed: 1
    device: auto
    log_every: 1
  loss_weights:
    count: 1.0
    anchor: 1.0
    param: 2.0
    kl: 0.0015
  output:
    dir: outputs/main/models/vae_reference
