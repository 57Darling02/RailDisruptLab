project:
  name: speed_limits_demo
  output_dir: outputs/speed_limits_demo
  base_context_path: inputs/context_下行计划时刻表.json

build:
  scenarios:
    delays: []
    speed_limits:
      - start_station: jinanxi
        end_station: taian
        start_time: "08:00:00"
        duration: 7200
        limit_speed: 80
      - start_station: qufudong
        end_station: tengzhoudong
        start_time: "09:30:00"
        duration: 7200
        limit_speed: 120

solve:
  lp_path: ""
  objective_delay_weight: 1.0
  objective_mode: abs
  cancellation_enabled: false
  cancellation_penalty_weight: 1000.0
  arr_arr_headway_seconds: 180
  dep_dep_headway_seconds: 180
  dwell_seconds_at_stops: 120
  big_m: 100000
  tolerance_delay_seconds: 7200

export-timetable:
  sol_path: ""

analyze:
  enable_metrics: true
  enable_plot: true
  plot_grid: true
  plot_title: Train Timetable - Speed Limits Demo
  adj_timetable_path: ""
  adj_timetable_sheet_name: Sheet1
