project:
  name: delays_demo
  output_dir: outputs/delays_demo
  base_context_path: inputs/context_下行计划时刻表.json

build:
  scenarios:
    delays:
      - train_id: G1
        station: jinanxi
        event_type: dep
        seconds: 600
    speed_limits: []

solve:
  lp_path: ""
  objective_delay_weight: 1.0
  objective_mode: abs
  cancellation_enabled: false
  cancellation_penalty_weight: 1000.0
  arr_arr_headway_seconds: 180
  dep_dep_headway_seconds: 180
  dwell_seconds_at_stops: 120
  big_m: 100000
  tolerance_delay_seconds: 7200

export-timetable:
  sol_path: ""

analyze:
  enable_metrics: true
  enable_plot: true
  plot_grid: true
  plot_title: Train Timetable - Delays Demo
  adj_timetable_path: ""
  adj_timetable_sheet_name: Sheet1
