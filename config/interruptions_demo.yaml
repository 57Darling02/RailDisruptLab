project:
  name: interruptions_demo
  output_dir: outputs/interruptions_demo
  base_context_path: inputs/context_下行计划时刻表.json

build:
  scenarios:
    delays: []
    speed_limits:
      - start_station: taian
        end_station: qufudong
        start_time: "09:00:00"
        duration: 2400
        limit_speed: 0
      - start_station: zaozhuang
        end_station: xuzhoudong
        start_time: "10:50:00"
        duration: 1800
        limit_speed: 0

solve:
  lp_path: ""
  objective_delay_weight: 1.0
  objective_mode: abs
  cancellation_enabled: true
  cancellation_penalty_weight: 10000.0
  arr_arr_headway_seconds: 180
  dep_dep_headway_seconds: 180
  dwell_seconds_at_stops: 120
  big_m: 100000
  tolerance_delay_seconds: 7200

export-timetable:
  sol_path: ""

analyze:
  enable_metrics: true
  enable_plot: true
  plot_grid: true
  plot_title: Train Timetable - Interruptions Demo
  adj_timetable_path: ""
  adj_timetable_sheet_name: Sheet1
