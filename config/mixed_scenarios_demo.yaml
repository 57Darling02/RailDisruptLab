project:
  name: mixed_scenarios_demo
  output_dir: outputs/mixed_scenarios_demo
  base_context_path: inputs/context_下行计划时刻表.json

build:
  scenarios:
    delays:
      - train_id: G1
        station: jinanxi
        event_type: dep
        seconds: 600
      - train_id: G1
        station: taian
        event_type: arr
        seconds: 240
    speed_limits:
      - start_station: jinanxi
        end_station: taian
        start_time: "08:00:00"
        duration: 7200
        limit_speed: 80
      - start_station: qufudong
        end_station: tengzhoudong
        start_time: "09:30:00"
        duration: 7200
        limit_speed: 120
      - start_station: taian
        end_station: qufudong
        start_time: "09:00:00"
        duration: 2400
        limit_speed: 0
      - start_station: zaozhuang
        end_station: xuzhoudong
        start_time: "10:50:00"
        duration: 1800
        limit_speed: 0

solve:
  lp_path: ""
  objective_delay_weight: 1.0
  objective_mode: abs
  cancellation_enabled: false
  cancellation_penalty_weight: 1000.0
  arr_arr_headway_seconds: 180
  dep_dep_headway_seconds: 180
  dwell_seconds_at_stops: 120
  big_m: 100000
  tolerance_delay_seconds: 7200

export-timetable:
  sol_path: ""

analyze:
  enable_metrics: true
  enable_plot: true
  plot_grid: true
  plot_title: Train Timetable - Mixed Scenarios Demo
  adj_timetable_path: ""
  adj_timetable_sheet_name: Sheet1
